services:
  postgres:
    image: postgres:16-alpine
    container_name: textile_postgresdocker
    restart: unless-stopped
    environment:
      POSTGRES_USER: textile_admin
      POSTGRES_PASSWORD: textile_secure_pass_2024
      POSTGRES_DB: textile_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U textile_admin -d textile_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: textile_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: textile-backend:latest
    container_name: textile_backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgresql://textile_admin:textile_secure_pass_2024@postgres:5432/textile_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Local development only. Must be >= 32 chars (validated at boot).
      # Production generates a fresh secret: openssl rand -hex 32
      - JWT_SECRET=local-dev-only-jwt-secret-do-not-use-in-production-0f3a9c
      - JWT_EXPIRATION=7d
      - FRONTEND_URL=http://localhost:3000
      - STRIPE_SECRET_KEY=sk_test_mock
      - STRIPE_WEBHOOK_SECRET=whsec_mock
      # AI gateway. Deliberately NOT depends_on the ai service: the API must
      # start and serve the shop whether or not the assistant is up, and it
      # falls back to plain product search when it cannot reach it.
      - AI_SERVICE_URL=http://ai:8000
      - INTERNAL_API_KEY=local-dev-internal-key
      - AI_TIMEOUT_MS=12000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── AI service (Phase 9, decision D9/D10) ─────────────────────────────────
  # A separate container because it is Python, and because an LLM call that hangs
  # must not be able to occupy the API's event loop or connection pool. A slow
  # assistant must never slow down checkout.
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: textile-ai:latest
    container_name: textile_ai
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      # READ-ONLY role. It can SELECT products, categories and inventory, and
      # nothing else — Postgres itself refuses writes and refuses to show it the
      # users table. See the ai_readonly_role migration.
      - DATABASE_URL_READONLY=postgresql://textile_ai_readonly:ai_readonly_local_dev_password@postgres:5432/textile_db
      - INTERNAL_API_KEY=local-dev-internal-key
      # No key -> the service still runs and returns ranked products from the
      # retriever. Add one to enable the LLM:
      #   LLM_API_KEY=sk-ant-...
      - LLM_PROVIDER=anthropic
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=claude-sonnet-5
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: textile-frontend:dev
    container_name: textile_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api/v1
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
