name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # A real Postgres. The integration suite (test/stock-race.e2e-spec.ts) proves
    # the oversell guard by racing concurrent transactions, and that cannot be
    # faked: row locking is a property of the database, not of our TypeScript.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: textile_admin
          POSTGRES_PASSWORD: textile_ci_password
          POSTGRES_DB: textile_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U textile_admin -d textile_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://textile_admin:textile_ci_password@localhost:5432/textile_ci?schema=public
      NODE_ENV: test
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      # Test-only values. These are not secrets and must never be reused.
      JWT_SECRET: ci-only-secret-not-used-outside-github-actions
      JWT_EXPIRATION: 7d
      PAYHERE_MERCHANT_ID: '1221149'
      PAYHERE_MERCHANT_SECRET: ci-only-sandbox-secret
      PAYHERE_MODE: sandbox
      PAYHERE_NOTIFY_URL: http://localhost:3001/api/v1/payments/payhere/notify
      STRIPE_SECRET_KEY: sk_test_mock
      STRIPE_PUBLISHABLE_KEY: pk_test_mock
      STRIPE_WEBHOOK_SECRET: whsec_mock

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      # Prisma client is needed for typecheck, build, and every test layer.
      - run: npx prisma generate

      # TODO: drop continue-on-error once the 129 pre-existing lint errors
      # (mostly @typescript-eslint/no-unsafe-* and prettier) are cleaned up.
      # Failing this gate today would block every PR on unrelated debt.
      - name: Lint
        run: npx eslint "{src,test}/**/*.ts"
        continue-on-error: true

      - name: Build (typecheck)
        run: npm run build

      # Unit tests mock Prisma, so they need no database.
      - name: Unit tests
        run: npm test

      # Replays the committed migration history onto an empty database. This is
      # the guard against a migration that only works on one developer's laptop:
      # prisma/migrations was gitignored until recently, and a clone without it
      # silently creates no tables at all.
      - name: Apply migrations to a clean database
        run: npx prisma migrate deploy

      # Seeding in CI does double duty. It gives the reconciliation step below a
      # database with real products in it to audit — and it proves the seed itself
      # still works, which matters because the container runs it on every boot
      # (Dockerfile: migrate deploy && db:seed && start:prod). The seed has already
      # shipped two real bugs: it created products with no inventory ledger, and it
      # clobbered the stock cache on every restart.
      - name: Seed
        run: npm run db:seed

      # Race, oversell, BR4, the CHECK-constraint backstop, and the 50-operation
      # inventory storm.
      - name: Integration tests (real Postgres)
        run: npm run test:integration

      # A whole-database audit of the stock ledger:
      #
      #   available = Σ(INITIAL,PURCHASE,ADJUSTMENT,DAMAGE,SALE)
      #   reserved  = Σ(RESERVE,RELEASE,SALE)
      #
      # To be clear about what this does and does not prove: the integration suite
      # already asserts reconciliation against its own 50-operation storm, in-test,
      # via the same findDrift() this script calls — that is the real guarantee.
      # This step audits the SEEDED catalogue (every product must open a ledger),
      # catches anything the suite failed to clean up, and proves the CLI itself
      # runs. A reconciler that crashes on startup is worse than no reconciler,
      # because you believe you have one.
      - name: Reconcile inventory (plan 5.1, task 4)
        run: npm run reconcile

  frontend:
    name: Frontend · build + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npx eslint .
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
